name: on-push-main

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/on-push-main.yaml"
      - ".github/workflows/on-version-tagged.yaml"
      - ".gitops/**"
      - "apis/**"
      - "examples/**"
      - "functions/**"
      - "tests/**"
      - "upbound.yaml"

permissions:
  packages: write
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  validate:
    uses: hops-ops/workflows-crossplane/.github/workflows/validate.yaml@v3.0.0
    with:
      examples: |
        [
          { "example": "examples/tenants/standard.yaml", "api_path": "apis/tenants" },
          { "example": "examples/tenants/adopt.yaml",    "api_path": "apis/tenants" },
          { "example": "examples/tenants/minimal.yaml",  "api_path": "apis/tenants" }
        ]
      error_on_missing_schemas: true

  test:
    uses: hops-ops/workflows-crossplane/.github/workflows/test.yaml@v3.0.0

  e2e:
    uses: hops-ops/workflows-crossplane/.github/workflows/e2e.yaml@v3.0.0

  version-and-tag:
    name: Version and Tag
    needs:
      - validate
      - test
      - e2e
    uses: unbounded-tech/workflow-vnext-tag/.github/workflows/workflow.yaml@v1.21.0
    secrets:
      DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
    with:
      useDeployKey: true
