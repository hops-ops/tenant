name: on-pr

on:
  pull_request:
    branches:
      - main
    types:
      - labeled
      - opened
      - reopened
      - synchronize
    paths:
      - ".github/workflows/on-pr.yaml"
      - ".gitops/**"
      - "apis/**"
      - "examples/**"
      - "tests/**"
      - "functions/**"
      - "upbound.yaml"

permissions:
  packages: write
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  validate:
    uses: hops-ops/workflows-crossplane/.github/workflows/validate.yaml@v3.0.0
    with:
      examples: |
        [
          { "example": "examples/tenants/standard.yaml", "api_path": "apis/tenants" },
          { "example": "examples/tenants/adopt.yaml",    "api_path": "apis/tenants" },
          { "example": "examples/tenants/minimal.yaml",  "api_path": "apis/tenants" }
        ]
      error_on_missing_schemas: true

  test:
    uses: hops-ops/workflows-crossplane/.github/workflows/test.yaml@v3.0.0

  e2e:
    uses: hops-ops/workflows-crossplane/.github/workflows/e2e.yaml@v3.0.0

  publish:
    needs:
      - validate
      - test
    uses: hops-ops/workflows-crossplane/.github/workflows/publish.yaml@v3.0.0
    secrets: inherit
    with:
      tag: pr-${{ github.event.pull_request.number }}-${{ github.sha }}
