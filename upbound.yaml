apiVersion: meta.dev.upbound.io/v2alpha1
kind: Project
metadata:
  name: tenant
spec:
  dependsOn:
  - apiVersion: pkg.crossplane.io/v1
    kind: Function
    package: xpkg.crossplane.io/crossplane-contrib/function-auto-ready
    version: '>=v0.6.4'
  - apiVersion: pkg.crossplane.io/v1
    kind: Provider
    package: xpkg.crossplane.io/crossplane-contrib/provider-kubernetes
    version: '>=v1'
  - apiVersion: pkg.crossplane.io/v1
    kind: Provider
    package: xpkg.crossplane.io/crossplane-contrib/provider-upjet-zitadel
    version: '>=v0.1.1'
  - apiVersion: pkg.crossplane.io/v1
    kind: Provider
    package: ghcr.io/hops-ops/provider-openpanel
    version: '>=v1.0.1'
  description: |
    Tenant — platform business-object XRD. Composes a per-Tenant Namespace
    plus the Zitadel identity scaffolding (Org + default Project + default
    Roles) and (optionally) a Capsule Tenant CR for K8s isolation. Foundation
    refs are echoed in status but not composed. Operators add additional
    Zitadel Projects/Roles or analytics resources via raw provider MRs in
    the per-Tenant namespace.
  license: Apache-2.0
  maintainer: Patrick Lee Scott <pat@patscott.io>
  readme: |
    # tenant

    Platform business-object XRD. A `Tenant` represents one customer
    agreement / business relationship and scaffolds the identity slice
    (Zitadel Org + default Project + default Roles) and optional K8s
    isolation (Capsule Tenant CR) in a per-Tenant namespace.

    See [[specs/tenant-xrd]] for the full design.
  repository: ghcr.io/hops-ops/tenant
  source: github.com/hops-ops/tenant
