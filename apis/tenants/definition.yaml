apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: tenants.hops.ops.com.ai
spec:
  group: hops.ops.com.ai
  names:
    kind: Tenant
    plural: tenants
  scope: Namespaced
  versions:
  - name: v1alpha1
    referenceable: true
    served: true
    schema:
      openAPIV3Schema:
        description: |
          Tenant is the platform's business-object kind. One Tenant per
          customer agreement / business relationship. Scaffolds the per-Tenant
          identity slice (Zitadel Org + default Project + default Roles) plus
          (optionally) an analytics slice (OpenPanel Org + default Project)
          and K8s isolation (Capsule Tenant CR), all in a per-Tenant namespace.

          Adoption of existing external resources follows Crossplane's
          standard convention — set the underlying resource's id in the spec
          (e.g., `identity.zitadel.orgId: "..."` or
          `analytics.openpanel.orgId: "..."`) and the composition propagates
          it as the composed MR's `crossplane.io/external-name` annotation.
          Pair with `managementPolicies: ["Observe", "Update", "LateInitialize"]`
          to prevent Crossplane from trying to recreate. Alternatively,
          apply the XR fresh and `kubectl annotate` the composed MR
          afterwards.

          Operators add additional Zitadel Projects/Roles, OpenPanel
          Projects/Clients, etc. by applying raw provider MRs in the
          per-Tenant namespace — keeps this XR thin.

          See [[specs/tenant-xrd]] for the design.
        type: object
        properties:
          spec:
            description: TenantSpec defines the desired state.
            type: object
            properties:
              clusterName:
                description: |
                  Target cluster name. Used as default for
                  kubernetesProviderConfigRef.name and label defaults. The
                  per-Tenant namespace is created on this cluster.
                type: string

              type:
                description: |
                  Tenant classification (informational; affects label defaults
                  and future billing tier behavior).
                type: string
                enum: ["business", "individual"]
                default: "business"

              display:
                description: Display metadata.
                type: object
                properties:
                  name:
                    description: Human-readable name shown in dashboards.
                    type: string
                  primaryDomain:
                    description: Canonical domain for this tenant.
                    type: string
                  aliasDomains:
                    description: |
                      Additional domains routing into the same identity scope
                      (e.g., pat-brand covers patscott.io + patrickleescott.com).
                    type: array
                    items:
                      type: string
                    default: []
                required:
                - name

              identity:
                description: Identity-slice configuration (Zitadel).
                type: object
                properties:
                  zitadel:
                    type: object
                    properties:
                      orgName:
                        description: |
                          Name of the Zitadel Org. Defaults to metadata.name
                          when empty.
                        type: string
                        default: ""
                      orgId:
                        description: |
                          Existing Zitadel Org UUID. When set, propagates as
                          the composed Org MR's crossplane.io/external-name
                          annotation (adoption pattern). Pair with
                          spec.managementPolicies excluding "Create" to
                          prevent Crossplane from trying to recreate.
                        type: string
                        default: ""
                      defaultProject:
                        description: |
                          Default Project composed inside the Tenant's Org.
                          Set skip: true to opt out (advanced — operator
                          applies raw Project MRs instead).
                        type: object
                        properties:
                          skip:
                            type: boolean
                            default: false
                          name:
                            description: |
                              Defaults to "<metadata.name>-default".
                            type: string
                            default: ""
                          roles:
                            description: |
                              Inline roles. Defaults to tenant-admin +
                              tenant-member when empty.
                            type: array
                            items:
                              type: object
                              properties:
                                key:
                                  type: string
                                displayName:
                                  type: string
                                  default: ""
                                group:
                                  type: string
                                  default: ""
                              required:
                              - key
                            default: []

              analytics:
                description: Analytics-slice configuration (OpenPanel).
                type: object
                properties:
                  openpanel:
                    type: object
                    properties:
                      enabled:
                        description: |
                          When true, composes an OpenPanel Organization MR
                          + (unless defaultProject.skip) a default OpenPanel
                          Project MR. Requires provider-openpanel installed
                          with a ProviderConfig pointing at the target
                          OpenPanel instance.
                        type: boolean
                        default: false
                      orgName:
                        description: |
                          Name of the OpenPanel Org (shown in the OpenPanel
                          dashboard). Defaults to display.name when empty.
                        type: string
                        default: ""
                      orgId:
                        description: |
                          Existing OpenPanel Organization UUID. When set,
                          propagates as the composed OpenPanel Org MR's
                          crossplane.io/external-name. Pair with
                          managementPolicies excluding "Create" to adopt.
                          Per [[reference_openpanel_organization_upsert_semantics]],
                          OpenPanel's TF provider Create is find-or-create;
                          adoption via external-name is the safe path.
                        type: string
                        default: ""
                      defaultProject:
                        description: |
                          Default OpenPanel Project composed inside the
                          Tenant's OpenPanel Org.
                        type: object
                        properties:
                          skip:
                            type: boolean
                            default: false
                          name:
                            description: |
                              Defaults to "<metadata.name>-default".
                            type: string
                            default: ""

              capsule:
                description: K8s isolation slice (Capsule).
                type: object
                properties:
                  enabled:
                    description: |
                      When true, composes a Capsule Tenant CR
                      (capsule.clastix.io/v1beta2/Tenant). Requires
                      Capsule (from tenant-stack) installed on the target
                      cluster.
                    type: boolean
                    default: false
                  userGroups:
                    description: |
                      OIDC claim group values that promote a user to Capsule
                      tenant-owner. Typically maps to the Zitadel Project
                      Role claim for tenant-admin.
                    type: array
                    items:
                      type: string
                    default: ["tenant-admin"]

              accounts:
                description: |
                  Per-cloud Foundation refs. Echoed in status but NOT
                  composed — Foundation lifecycle is owned externally.
                type: object
                properties:
                  aws:
                    type: object
                    properties:
                      foundationRef:
                        type: object
                        properties:
                          apiVersion:
                            type: string
                          kind:
                            type: string
                          name:
                            type: string
                          namespace:
                            type: string

              billing:
                description: Billing / budget metadata (flows to AWS tags).
                type: object
                properties:
                  tag:
                    type: string
                  budgets:
                    type: object
                    properties:
                      monthly:
                        type: number
                      alertThresholdPercent:
                        type: number
                        default: 80

              providerConfigRefs:
                description: |
                  ProviderConfig refs for the composed resources. Each defaults
                  to a convention-derived name based on clusterName.
                type: object
                properties:
                  kubernetes:
                    type: object
                    properties:
                      name:
                        type: string
                      kind:
                        type: string
                        default: "ProviderConfig"
                  zitadel:
                    description: |
                      ProviderConfig for provider-upjet-zitadel. Defaults to
                      "<clusterName>-zitadel".
                    type: object
                    properties:
                      name:
                        type: string
                      kind:
                        type: string
                        default: "ProviderConfig"
                  openpanel:
                    description: |
                      ProviderConfig for provider-openpanel. Defaults to
                      "<clusterName>-openpanel".
                    type: object
                    properties:
                      name:
                        type: string
                      kind:
                        type: string
                        default: "ProviderConfig"

              managementPolicies:
                description: |
                  Crossplane managementPolicies for all composed resources.
                  Defaults to ["*"]. For adoption flows, set to
                  ["Observe", "Update", "LateInitialize"].
                type: array
                items:
                  type: string
                default: ["*"]

              labels:
                description: |
                  Custom labels merged with stack defaults; applied to every
                  composed resource.
                type: object
                additionalProperties:
                  type: string
                x-kubernetes-preserve-unknown-fields: true

            required:
            - clusterName
            - display

          status:
            type: object
            properties:
              namespace:
                type: string
              identity:
                type: object
                properties:
                  zitadel:
                    type: object
                    properties:
                      orgId:
                        type: string
                      defaultProject:
                        type: object
                        properties:
                          name:
                            type: string
                          projectId:
                            type: string
                          roles:
                            type: object
                            additionalProperties:
                              type: object
                              properties:
                                roleId:
                                  type: string
              analytics:
                type: object
                properties:
                  openpanel:
                    type: object
                    properties:
                      enabled:
                        type: boolean
                      orgId:
                        type: string
                      defaultProject:
                        type: object
                        properties:
                          name:
                            type: string
                          projectId:
                            type: string
              capsule:
                type: object
                properties:
                  enabled:
                    type: boolean
                  tenantName:
                    type: string
              accounts:
                type: object
                properties:
                  aws:
                    type: object
                    properties:
                      foundationRef:
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
              ready:
                type: boolean
        required:
        - spec
