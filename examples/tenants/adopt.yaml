# Adoption — takes over the existing pat-local "tenant-platform" Zitadel
# Org (id 373268222482392664). Set identity.zitadel.orgId to the existing
# UUID and managementPolicies to Observe/Update/LateInitialize (no Create).
#
# Alternative: apply without spec.identity.zitadel.orgId, then
# `kubectl annotate org <name>-org crossplane.io/external-name=<id>`
# afterwards. Same end-state.
#
# defaultProject.skip: true because the existing Org already has its
# platform-services Project; operator manages additional Projects via raw
# Zitadel Project MRs.
apiVersion: hops.ops.com.ai/v1alpha1
kind: Tenant
metadata:
  name: ops-com-ai
  namespace: tenants
spec:
  clusterName: pat-local
  type: business
  display:
    name: "ops.com.ai"
    primaryDomain: ops.com.ai
  identity:
    zitadel:
      orgId: "373268222482392664"
      defaultProject:
        skip: true
  capsule:
    enabled: true
    userGroups: [tenant-admin]
  managementPolicies: ["Observe", "Update", "LateInitialize"]
