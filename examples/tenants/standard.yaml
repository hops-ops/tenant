# Standard Tenant — fresh Org + default Project + default Roles +
# OpenPanel Org + default OpenPanel Project + Capsule Tenant CR + AWS
# Foundation ref echo. Scaffolds the full identity + analytics + isolation
# slices in one apply.
apiVersion: hops.ops.com.ai/v1alpha1
kind: Tenant
metadata:
  name: ops-com-ai
  namespace: default
spec:
  clusterName: pat-local
  type: business
  display:
    name: "ops.com.ai"
    primaryDomain: ops.com.ai
  identity:
    zitadel: {}
  analytics:
    openpanel:
      enabled: true
  capsule:
    enabled: true
    userGroups: [tenant-admin]
  accounts:
    aws:
      foundationRef:
        apiVersion: aws.hops.ops.com.ai/v1alpha1
        kind: Foundation
        name: ops-com-ai-aws
        namespace: foundations
  billing:
    tag: ops-com-ai
    budgets: { monthly: 1000, alertThresholdPercent: 80 }
