# Standard Tenant — create mode, capsule enabled, AWS Foundation ref echoed.
# Scaffolds:
#   - Namespace "ops-com-ai"
#   - Zitadel Org "ops-com-ai"
#   - Default Zitadel Project "ops-com-ai-default" + tenant-admin/tenant-member Roles
#   - Capsule Tenant CR "ops-com-ai"
apiVersion: hops.ops.com.ai/v1alpha1
kind: Tenant
metadata:
  name: ops-com-ai
  namespace: tenants
spec:
  clusterName: pat-local
  type: business
  display:
    name: "ops.com.ai"
    primaryDomain: ops.com.ai
  identity:
    zitadel:
      mode: create
  capsule:
    enabled: true
    userGroups: [tenant-admin]
  accounts:
    aws:
      foundationRef:
        apiVersion: aws.hops.ops.com.ai/v1alpha1
        kind: Foundation
        name: ops-com-ai-aws
        namespace: foundations
  billing:
    tag: ops-com-ai
    budgets: { monthly: 1000, alertThresholdPercent: 80 }
